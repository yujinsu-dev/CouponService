services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_APPLICATION_NAME: coupon
      SPRING_DATASOURCE_URL: jdbc:mysql://${RDS_ENDPOINT}:${RDS_PORT:-3306}/${RDS_DATABASE:-coupon}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${DB_POOL_MAXIMUM_SIZE:-30}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${DB_POOL_MINIMUM_IDLE:-10}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${DB_POOL_CONNECTION_TIMEOUT:-30000}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_OPEN_IN_VIEW: false
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_APPLICATION_JSON: '{"spring":{"jpa":{"properties":{"hibernate":{"default_batch_fetch_size":${HIBERNATE_DEFAULT_BATCH_FETCH_SIZE:-100},"format_sql":false}}}}}'

  redis:
    image: redis:7.4-alpine
    profiles:
      - local
